name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.14
      - name: Lock dependencies
        run: uv lock
      - name: Sync dependencies (docs)
        run: uv sync --frozen --extra docs
      - name: Build MkDocs site
        run: uv run mkdocs build
      # ── Setup Pages ────────────────────────────────────────────────
      # One-time manual step: a repo admin must enable GitHub Pages via
      # Settings → Pages → Source: "GitHub Actions". No PAT or secret is
      # needed for this — it's a lightweight one-time repo setting.
      #
      # Do NOT add `enablement: true` or a `token:` PAT here. `enablement`
      # would auto-create the Pages site, but that requires a token with
      # `administration: write`, which the stock `GITHUB_TOKEN` cannot
      # hold — forcing a separate PAT secret we deliberately avoid. This
      # file has thrashed between the bare and PAT forms (see PRs
      # #30/#31/#33/#35); keep it as the bare step below.
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
