name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege GITHUB_TOKEN: the test job only reads the repo.
permissions:
  contents: read

# Cancel superseded runs for the same PR; let push runs on main finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.14
      - name: Lock dependencies
        run: uv lock
      - name: Sync dependencies
        run: uv sync --frozen --extra dev
      - name: Scan dependencies for vulnerabilities
        run: uv run pip-audit --strict --vulnerability-service osv
      - name: Check dependencies
        run: uv run deptry .
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: SAST scan (bandit)
        run: uv run bandit -r src -ll
      - name: Secret scan (detect-secrets)
        run: uv run detect-secrets scan --baseline .secrets.baseline
      - name: Dead code check (vulture)
        run: uv run vulture src/ vulture_whitelist.py
      - name: Type check
        run: uv run mypy src tests
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install JS lint deps
        run: npm install
      - name: Lint JavaScript
        run: npx eslint src/robotsix_board/static/board.js
      - name: Lint CSS
        run: npx stylelint src/robotsix_board/static/board.css
      - name: Run JavaScript unit tests
        run: npx vitest run --coverage
      - name: Run tests with coverage
        run: uv run pytest
