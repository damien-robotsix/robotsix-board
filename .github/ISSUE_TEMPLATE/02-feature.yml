name: Feature Request
description: Propose a new feature or enhancement for robotsix-board.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Describe the problem you are trying to
        solve — that helps us evaluate the best approach.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Why is it
        important?
      placeholder: |
        I'm trying to ... but the library currently does not support ...
        This matters because ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would a good solution look like? Be as specific
        as you can — API shape, configuration, behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you thought about? Are
        there workarounds you are using today?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, screenshots, relevant prior
        art in similar libraries.
